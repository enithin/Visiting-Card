<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Visiting Card</title>
    <style>
        :root {
            /* Vibrant Mesh Gradient Palette */
            --bg-gradient: linear-gradient(45deg, #ff0066, #4a90e2, #9b51e0, #00f2fe);
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --accent-glow: #00f2fe;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            color: var(--text-color);
        }

        .profile-container {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
        }

        .status-dot {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 18px;
            height: 18px;
            background: #2ecc71;
            border: 3px solid #1e1e1e;
            border-radius: 50%;
        }

        h1 { font-size: 1.8rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        p { font-size: 1rem; opacity: 0.9; margin: 8px 0 25px; font-weight: 300; }

        .links { display: flex; flex-direction: column; gap: 12px; }

        .link-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.95rem;
        }

        /* Hover Transitions */
        .link-btn:hover {
            transform: scale(1.05);
            background: white;
            color: #1e1e1e;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .insta-btn:hover { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888) !important; color: white !important; }
        .fb-btn:hover { background: #1877F2 !important; color: white !important; }
        
        .save-btn { background: #fff; color: #111; margin-top: 10px; }
        .save-btn:hover { background: var(--accent-glow) !important; }

        /* Toast Message */
        .toast {
            visibility: hidden;
            min-width: 200px;
            background: #fff;
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 12px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .toast.show { visibility: visible; animation: fadeInOut 2.5s; }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; bottom: 0; }
            20%, 80% { opacity: 1; bottom: 30px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-container">
            <img src="https://github.com/github.png" alt="Profile" class="profile-img">
            <div class="status-dot"></div>
        </div>

        <h1>Your Name</h1>
        <p>Full Stack Developer & Designer</p>

        <div class="links">
            <a href="#" class="link-btn">✨ Portfolio</a>
            <a href="https://instagram.com/yourusername" class="link-btn insta-btn">📸 Instagram</a>
            <a href="https://facebook.com/yourusername" class="link-btn fb-btn">👥 Facebook</a>
            <a href="#" class="link-btn">🔗 LinkedIn</a>
            
            <button class="link-btn copy-btn" onclick="copyProfileLink()">📋 Copy My Link</button>
            <button class="link-btn save-btn" onclick="downloadVCard()">📲 Save Contact</button>
        </div>
    </div>

    <div id="toast" class="toast">Link Copied! ✅</div>

    <script>
        // CONFIGURATION: Set your info here for the Save Contact button
        const CONTACT_INFO = {
            name: "Nithin Babu",
            phone: "+919526163263",
            email: "eittickalnithin@gmail.com",
            title: "Technical Advisor"
        };

        function downloadVCard() {
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${CONTACT_INFO.name}\nTITLE:${CONTACT_INFO.title}\nTEL;TYPE=CELL:${CONTACT_INFO.phone}\nEMAIL:${CONTACT_INFO.email}\nEND:VCARD`;
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${CONTACT_INFO.name.replace(/\s/g, '_')}.vcf`;
            a.click();
        }

        function copyProfileLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const toast = document.getElementById("toast");
                toast.className = "toast show";
                setTimeout(() => { toast.className = "toast"; }, 2500);
            });
        }
    </script>
</body>
</html>
